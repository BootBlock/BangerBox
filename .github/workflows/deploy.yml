name: Deploy to GitHub Pages

# Manual only — this never runs on push. Publish by opening the repo's "Actions" tab,
# selecting this workflow and clicking "Run workflow". Local-first remains the canonical
# environment (spec §1.3 #14); Pages is an optional public mirror, so releasing is a
# deliberate act rather than a consequence of merging.
on:
  workflow_dispatch:

# Least-privilege for a Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      # A project Pages site is served from /<repo>/, not the domain root. This is the
      # ONLY build that sets it — dev, preview and the browser smoke stay on '/'.
      # It also drives the manifest id/scope/start_url (see vite.config.ts).
      - name: Build
        run: npm run build
        env:
          BANGERBOX_BASE: /BangerBox/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
