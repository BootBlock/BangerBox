name: Regenerate lockfile on Linux

# TEMPORARY, manual-only. npm on Windows cannot resolve some Linux-side optional
# transitive dependencies (@emnapi/*), so a lockfile generated on the dev machine makes
# `npm ci` fail on the ubuntu runners. This job resolves the tree on Linux and uploads
# the result to be committed. Delete this workflow once the lockfile is in place.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  relock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 25

      - name: Resolve the dependency tree on Linux
        run: npm install --package-lock-only

      - name: Confirm npm ci accepts the result
        run: npm ci --dry-run

      - name: Upload the lockfile
        uses: actions/upload-artifact@v5
        with:
          name: package-lock
          path: package-lock.json
