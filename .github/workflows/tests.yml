name: Tests

# Runs on every push to main and on pull requests. Node 25 throughout: package.json
# `engines` requires >= 24, the dev machine runs 25 (spec §1.3 #2), and pinning the
# same major here means `npm ci` resolves the committed lockfile identically.
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: these jobs only read the checkout.
permissions:
  contents: read

jobs:
  quality:
    name: Type-check, lint & project checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cheapest, highest-signal first: types, then lint, then the project's own
      # invariant checks (closed dependency surface, British English, no open stubs).
      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Project checks (deps, language, stubs)
        run: npm run verify

      - name: Format check
        run: npm run format:check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The DSP kernels are gitignored build artefacts and the golden-output tests load
      # them from disk, so five test files fail without this. `npm test` does not build
      # them; this step must come first.
      - name: Build the WASM DSP kernels
        run: npm run build:wasm

      - name: Run unit tests
        run: npm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Proves the shipped artefact still builds (kernels + factory packs + tsc -b + vite
      # build). The real-browser smokes run in the `smoke` job below, on Windows.
      - name: Build
        run: npm run build

  smoke:
    name: Real-browser smoke (Edge)
    # windows-latest, not ubuntu: all three smokes drive the system-installed Edge
    # (`channel: 'msedge'`, spec §1.3 #13) rather than downloading a browser binary, and
    # only the Windows image ships Edge preinstalled. Running them here keeps that locked
    # decision intact — no script and no spec text changes to put them in CI (#15).
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      # browser-smoke.mjs spawns vite's dev and build directly, so it never runs the
      # `build:wasm`/`build:factory` steps `npm run build` wraps them in. Without these the
      # DSP kernels are missing and the Factory panel fails to parse its pack index.
      - name: Build the WASM DSP kernels and factory packs
        run: npm run build:wasm && npm run build:factory

      # §11.4: isolation, start gate, audible output, OPFS round-trip, offline PWA reload.
      - name: Browser smoke (dev + offline PWA)
        run: npm run test:e2e

      # The remaining two smokes assert the *Pages* path, where isolation has to come from
      # the service worker, so they need a build carrying the Pages base path.
      - name: Build with the Pages base path
        run: npm run build
        env:
          BANGERBOX_BASE: /BangerBox/

      # §14 (m): header-less host, service-worker isolation, and the capability gate's
      # import-time regression guard.
      - name: Pages smoke
        run: npm run test:pages

      # §14 (n): the gate's own copy plus the bootstrap retry logic.
      - name: Capability gate smoke
        run: npm run test:gate
