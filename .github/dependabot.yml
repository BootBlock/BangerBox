version: 2
updates:
  # App dependencies. NOTE: spec §2.2 defines a CLOSED dependency surface enforced by
  # `npm run check:deps` — Dependabot may bump versions but a PR that ADDS a package
  # will fail that check by design. Close such PRs rather than widening the matrix.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Fold routine minor/patch bumps into one PR to keep the noise down; majors still
      # arrive individually so each can be reviewed on its own merits.
      npm-minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      # Pinned deliberately — eslint-plugin-jsx-a11y caps at ESLint 9, and
      # typescript-eslint caps at TypeScript < 6.1. Revisit when those plugins catch up;
      # bumping any of these majors breaks `npm run lint`.
      #
      # `@eslint/js` is versioned in lockstep with `eslint` but is a SEPARATE package
      # name, so it needs its own rule — omitting it let Dependabot open a failing
      # ESLint 10 PR (#1) even while `eslint` itself was pinned.
      - dependency-name: eslint
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: typescript-eslint
        update-types: ['version-update:semver-major']
      - dependency-name: typescript
        update-types: ['version-update:semver-major']

  # Keep the actions used by the workflows current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
